<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sessão Diária — Treino Mental</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#13201C">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --fundo: #13201C;
    --fundo-alto: #1B2A24;
    --painel: #1F302A;
    --osso: #F2EEE3;
    --osso-suave: #C9C4B4;
    --ambar: #E8A33D;
    --ambar-fraco: rgba(232,163,61,0.18);
    --salva: #6B8F71;
    --terracota: #C75C4A;
    --linha: rgba(242,238,227,0.10);
    --sombra: 0 18px 40px -12px rgba(0,0,0,0.45);
    --raio: 18px;
    --raio-peq: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(232,163,61,0.10), transparent 60%),
      var(--fundo);
    color:var(--osso);
    font-family:'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .f-display{ font-family:'Fraunces', Georgia, 'Source Serif Pro', serif; font-weight:600; letter-spacing:-0.01em; }
  .f-corpo{ font-family:inherit; }

  a{ color:inherit; }
  button{ font-family:inherit; cursor:pointer; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--ambar); outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  .pagina{
    max-width:640px;
    margin:0 auto;
    padding:28px 20px 64px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- CABEÇALHO ---------- */
  .cabecalho{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    margin-bottom:28px;
  }
  .marca{
    display:flex; align-items:center; gap:10px;
  }
  .marca .sol{
    width:34px; height:34px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FBD98A, var(--ambar) 70%);
    box-shadow:0 0 0 1px rgba(0,0,0,0.15), 0 6px 16px -4px rgba(232,163,61,0.55);
    flex-shrink:0;
  }
  .marca-texto{ display:flex; flex-direction:column; line-height:1.15; }
  .marca-titulo{ font-size:18px; font-weight:700; }
  .marca-sub{ font-size:12.5px; color:var(--osso-suave); }
  .data-hoje{
    text-align:right; font-size:12.5px; color:var(--osso-suave);
    padding-top:4px;
  }
  .streak-pill{
    display:inline-flex; align-items:center; gap:5px;
    background:var(--ambar-fraco); color:var(--ambar);
    border-radius:999px; padding:3px 10px; font-size:12px; font-weight:600;
    margin-top:6px;
  }
  .btn-limpar-dados{
    display:inline-flex; align-items:center; gap:4px;
    background:transparent; border:1px solid var(--linha); color:var(--osso-suave);
    border-radius:999px; padding:3px 10px; font-size:11.5px; font-weight:600;
    margin-top:6px; transition:border-color 0.15s ease, color 0.15s ease;
  }
  .btn-limpar-dados:hover{ border-color:var(--terracota); color:var(--terracota); }

  /* ---------- ARCO DE PROGRESSO (assinatura visual) ---------- */
  .arco-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:8px 0 22px;
  }
  .arco-svg{ width:100%; max-width:420px; height:auto; display:block; }
  .arco-rotulo{
    text-align:center;
    font-size:13px;
    color:var(--osso-suave);
    margin-top:10px;
  }
  .arco-rotulo strong{ color:var(--osso); }
  .arco-segmento{
    transition:stroke 0.5s ease, opacity 0.5s ease;
  }
  .arco-marcador{
    transition:transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s ease;
  }

  /* ---------- CARTÃO DA SESSÃO ---------- */
  .sessao-card{
    background:var(--painel);
    border:1px solid var(--linha);
    border-radius:var(--raio);
    padding:26px 24px 24px;
    box-shadow:var(--sombra);
    flex:1;
    display:flex;
    flex-direction:column;
  }
  .etapa-eyebrow{
    display:flex; align-items:center; gap:8px;
    font-size:12.5px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;
    color:var(--ambar); margin-bottom:10px;
  }
  .etapa-eyebrow .icone-etapa{
    width:22px; height:22px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    background:var(--ambar-fraco); font-size:13px;
  }
  .etapa-titulo{
    font-size:24px; margin:0 0 6px;
  }
  .etapa-tema{
    font-size:14px; color:var(--osso-suave); margin:0 0 20px;
  }

  /* ---------- ECRÃ DE BOAS-VINDAS / RESUMO ---------- */
  .resumo-bloco{ text-align:center; padding:18px 0 6px; }
  .resumo-grande{ font-size:42px; margin:6px 0 4px; }
  .resumo-texto{ color:var(--osso-suave); font-size:14.5px; max-width:380px; margin:0 auto 26px; }
  .resumo-etapas{ display:flex; gap:10px; margin:18px 0 26px; }
  .resumo-etapa-item{
    flex:1; background:var(--fundo-alto); border:1px solid var(--linha);
    border-radius:var(--raio-peq); padding:14px 10px; text-align:center;
  }
  .resumo-etapa-item .icone{ font-size:20px; display:block; margin-bottom:6px; }
  .resumo-etapa-item .rotulo{ font-size:11.5px; color:var(--osso-suave); text-transform:uppercase; letter-spacing:0.03em; }
  .resumo-etapa-item .tema{ font-size:12.5px; color:var(--osso); margin-top:3px; font-weight:600; }

  /* ---------- BOTÕES ---------- */
  .btn{
    border:1px solid var(--linha);
    background:var(--fundo-alto);
    color:var(--osso);
    border-radius:12px;
    padding:13px 20px;
    font-size:15px;
    font-weight:600;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover{ border-color:rgba(242,238,227,0.22); }
  .btn:active{ transform:scale(0.98); }
  .btn-primario{
    background:var(--ambar);
    color:#23170A;
    border-color:transparent;
  }
  .btn-primario:hover{ background:#F0B254; }
  .btn-fantasma{ background:transparent; }
  .btn-grande{ width:100%; padding:16px 20px; font-size:16px; }
  .btn[disabled]{ opacity:0.45; cursor:not-allowed; transform:none; }

  /* ---------- CRUZADA (mini, dentro da sessão) ---------- */
  .mini-cx-grelha{
    display:inline-grid;
    gap:3px;
    margin:0 auto 18px;
    justify-content:center;
  }
  .mini-cx-celula{
    width:36px; height:36px;
    background:var(--fundo-alto);
    border-radius:6px;
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .mini-cx-celula.bloco{ background:transparent; }
  .mini-cx-celula input{
    width:100%; height:100%;
    background:transparent;
    border:2px solid var(--linha);
    border-radius:6px;
    color:var(--osso);
    text-align:center;
    font-size:17px;
    font-weight:700;
    text-transform:uppercase;
    font-family:inherit;
  }
  .mini-cx-celula input:focus{ border-color:var(--ambar); outline:none; }
  .mini-cx-celula.letra-activa input{ background:var(--ambar-fraco); border-color:var(--ambar); }
  .mini-cx-celula.palavra-activa input{ border-color:rgba(232,163,61,0.45); }
  .mini-cx-celula.certo input{ border-color:var(--salva); background:rgba(107,143,113,0.18); }
  .mini-cx-celula.errado input{ border-color:var(--terracota); background:rgba(199,92,74,0.18); }
  .mini-cx-celula .num{
    position:absolute; top:1px; left:3px; font-size:8px; color:var(--osso-suave); font-weight:600;
  }
  .mini-cx-celula.flash input{ animation:cxFlash 0.6s ease-out; }
  @keyframes cxFlash{
    0%{ background:var(--ambar); border-color:var(--ambar); }
    100%{ background:rgba(107,143,113,0.18); border-color:var(--salva); }
  }
  .mini-cx-pista-actual{
    text-align:center;
    background:var(--fundo-alto);
    border:1px solid var(--linha);
    border-radius:var(--raio-peq);
    padding:12px 16px;
    margin-bottom:18px;
    font-size:15px;
  }
  .mini-cx-pista-actual .num{ color:var(--ambar); font-weight:700; margin-right:6px; }
  .mini-cx-nav{
    display:flex; gap:10px; justify-content:center; margin-bottom:6px;
  }
  .mini-cx-nav button{
    background:var(--fundo-alto); border:1px solid var(--linha); color:var(--osso);
    width:38px; height:38px; border-radius:10px; font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .mini-cx-nav button:hover{ border-color:var(--ambar); }

  /* ---------- TRIVIA / LÓGICA (perguntas de escolha múltipla) ---------- */
  .pergunta-texto{
    font-size:18px; line-height:1.45; margin-bottom:22px; font-weight:500;
  }
  .opcoes{ display:flex; flex-direction:column; gap:10px; margin-bottom:6px; }
  .opcao{
    text-align:left;
    background:var(--fundo-alto);
    border:1px solid var(--linha);
    border-radius:12px;
    padding:14px 16px;
    font-size:15px;
    color:var(--osso);
    display:flex; align-items:center; gap:12px;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .opcao:hover:not([disabled]){ border-color:rgba(232,163,61,0.5); }
  .opcao .letra{
    width:24px; height:24px; border-radius:7px;
    background:rgba(242,238,227,0.08);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; flex-shrink:0;
  }
  .opcao.certa{ border-color:var(--salva); background:rgba(107,143,113,0.16); }
  .opcao.certa .letra{ background:var(--salva); color:#0E1A12; }
  .opcao.errada{ border-color:var(--terracota); background:rgba(199,92,74,0.16); }
  .opcao.errada .letra{ background:var(--terracota); color:#2A0E09; }
  .opcao[disabled]{ cursor:default; }

  .explicacao{
    margin-top:16px;
    padding:14px 16px;
    background:var(--fundo-alto);
    border-left:3px solid var(--ambar);
    border-radius:0 10px 10px 0;
    font-size:13.5px;
    color:var(--osso-suave);
    display:none;
  }
  .explicacao.visivel{ display:block; }

  /* ---------- RODAPÉ DA ETAPA ---------- */
  .etapa-rodape{
    margin-top:auto;
    padding-top:20px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
  }

  /* ---------- ECRÃ FINAL ---------- */
  .final-selo{
    width:74px; height:74px; border-radius:50%; margin:6px auto 18px;
    background:radial-gradient(circle at 35% 30%, #FBD98A, var(--ambar) 70%);
    display:flex; align-items:center; justify-content:center; font-size:32px;
    box-shadow:0 10px 24px -8px rgba(232,163,61,0.6);
  }

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--fundo-alto); border:1px solid var(--linha); color:var(--osso);
    padding:12px 20px; border-radius:12px; font-size:14px;
    box-shadow:var(--sombra);
    opacity:0; pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:50;
    max-width:90vw;
  }
  .toast.mostrar{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  .toast.sucesso{ border-color:var(--salva); }
  .toast.erro{ border-color:var(--terracota); }
  .toast.aviso{ border-color:var(--ambar); }

  .visualmente-escondido{
    position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);
  }

  @media (max-width:420px){
    .mini-cx-celula{ width:30px; height:30px; }
    .mini-cx-celula input{ font-size:14px; }
    .etapa-titulo{ font-size:21px; }
    .pergunta-texto{ font-size:16.5px; }
    .resumo-grande{ font-size:34px; }
  }
</style>
</head>

      <div class="marca-texto">

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

const ARMAZEM = {
  PREFIXO: 'sessao_diaria_',
  chave(nome){ return this.PREFIXO + nome; },
  ler(nome, valorPadrao){
    try{ const b = localStorage.getItem(this.chave(nome)); return b === null ? valorPadrao : JSON.parse(b); }
    catch(e){ return valorPadrao; }
  },
  guardar(nome, valor){
    try{ localStorage.setItem(this.chave(nome), JSON.stringify(valor)); return true; }
    catch(e){ return false; }
  },
  remover(nome){ try{ localStorage.removeItem(this.chave(nome)); }catch(e){} }
};

function obterIdUtilizadorAnonimo(){
  let id = ARMAZEM.ler('id_utilizador', null);
  if(!id){ id = Math.random().toString(36).slice(2) + Date.now().toString(36); ARMAZEM.guardar('id_utilizador', id); }
  return id;
}

function limparTodosOsDados(){
  const confirmar = window.confirm('Isto vai apagar todo o progresso, a sequência de dias e a sessão actual guardados neste dispositivo. Esta acção não pode ser desfeita.\n\nDeseja continuar?');
  if(!confirmar) return;
  try{
    const chaves = [];
    for(let i = 0; i < localStorage.length; i++){
      const chave = localStorage.key(i);
      if(chave && chave.startsWith(ARMAZEM.PREFIXO)) chaves.push(chave);
    }
    chaves.forEach(chave => localStorage.removeItem(chave));
  } catch(e){
    console.error('Falha ao limpar dados:', e);
  }
  
  SESSAO = null;
  _grelhaInfoCache = null;
  sessionStorage.setItem('sessao_diaria_limpo', 'true');
  window.location.reload();
}

function obterDataDeHoje(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function obterDataExtenso(){
  const dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const d = new Date();
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]}`;
}

function criarPRNG(seedStr){
  let h = 1779033703 ^ seedStr.length;
  for(let i=0; i<seedStr.length; i++){
    h = Math.imul(h ^ seedStr.charCodeAt(i), 3432918353); h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h >>> 16), 2246822507); h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16; return (h >>> 0) / 4294967296;
  };
}

function prngDoDia(sal){
  const seed = obterIdUtilizadorAnonimo() + '_' + obterDataDeHoje() + '_' + (sal || '');
  return criarPRNG(seed);
}

function baralharComPRNG(arr, rng){
  const c = arr.slice();
  for(let i = c.length - 1; i > 0; i--){
    const j = Math.floor(rng() * (i + 1));
    [c[i], c[j]] = [c[j], c[i]];
  }
  return c;
}

function escolherUm(lista, rng){ return lista[Math.floor(rng() * lista.length)]; }

let _toastTimer = null;
function mostrarToast(mensagem, tipo){
  const el = document.getElementById('toast');
  el.textContent = mensagem;
  el.className = 'toast mostrar' + (tipo ? ' ' + tipo : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.classList.remove('mostrar'); }, 3000);
}

function normalizarLetra(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().replace(/[^A-Z]/g, '');
}

// Escolhe deterministicamente, para o dia/utilizador actual, qual tema/categoria/puzzle
// de cada etapa compõe a sessão. Muda todos os dias; é estável dentro do mesmo dia.
function construirPlanoDoDia(){
  const rngTema = prngDoDia('plano_cruzada_tema');
  const tema = escolherUm(CX_TEMAS.filter(t => CX_BANCO[t.id]), rngTema);
  const nivel = 'facil'; // mantém a etapa da cruzada curta, adequada a uma sessão de ~10 minutos
  const listaCx = (CX_BANCO[tema.id] && CX_BANCO[tema.id][nivel]) || [];
  const rngCxIdx = prngDoDia('plano_cruzada_idx');
  const puzzleCx = listaCx.length ? listaCx[Math.floor(rngCxIdx() * listaCx.length)] : null;

  const catsTv = Object.keys(TV_BANCO);
  const rngTv = prngDoDia('plano_trivia_cat');
  const catTvId = escolherUm(catsTv, rngTv);
  const rngTvOrdem = prngDoDia('plano_trivia_ordem');
  const ordemTv = baralharComPRNG(TV_BANCO[catTvId].perguntas.map((_,i)=>i), rngTvOrdem).slice(0, PERGUNTAS_POR_ETAPA);

  const catsLg = Object.keys(LG_BANCO);
  const rngLg = prngDoDia('plano_logica_cat');
  const catLgId = escolherUm(catsLg, rngLg);
  const rngLgOrdem = prngDoDia('plano_logica_ordem');
  const ordemLg = baralharComPRNG(LG_BANCO[catLgId].puzzles.map((_,i)=>i), rngLgOrdem).slice(0, PERGUNTAS_POR_ETAPA);

  return {
    data: obterDataDeHoje(),
    cruzada: { temaId: tema.id, temaNome: tema.nome, nivel, puzzle: puzzleCx },
    trivia: { categoriaId: catTvId, categoriaNome: TV_BANCO[catTvId].nome, ordem: ordemTv },
    logica: { categoriaId: catLgId, categoriaNome: LG_BANCO[catLgId].nome, ordem: ordemLg },
  };
}

/* ============================================================ */
/* ========================= ESTADO DA SESSÃO ======================= */
/* ============================================================ */
let SESSAO = null;
/*
SESSAO = {
  plano: {...},                 // de construirPlanoDoDia()
  etapaActual: 'inicio' | 'cruzada' | 'trivia' | 'logica' | 'fim',
  cruzada: { respostas:{}, palavraActivaIdx, celulaActiva, finalizada },
  trivia: { posicao, acertos, respondidaActual, idxEscolhido },
  logica: { posicao, acertos, respondidaActual, idxEscolhido },
  concluidaEm: null | timestamp
}
*/

function chaveSessaoArmazenada(){ return 'sessao_' + obterDataDeHoje(); }

function carregarOuCriarSessao(){
  const guardada = ARMAZEM.ler(chaveSessaoArmazenada(), null);
  if(guardada && guardada.plano && guardada.plano.data === obterDataDeHoje()){
    SESSAO = guardada;
    _grelhaInfoCache = null;
    return;
  }
  const plano = construirPlanoDoDia();
  SESSAO = {
    plano,
    etapaActual: 'inicio',
    cruzada: { respostas:{}, palavraActivaIdx: plano.cruzada.puzzle && plano.cruzada.puzzle.words.length ? 0 : -1, celulaActiva:null, finalizada:false },
    trivia: { posicao:0, acertos:0, respondidaActual:false, idxEscolhido:null },
    logica: { posicao:0, acertos:0, respondidaActual:false, idxEscolhido:null },
    concluidaEm: null
  };
  _grelhaInfoCache = null;
  guardarSessao();
}

function guardarSessao(){
  if(!SESSAO) return;
  ARMAZEM.guardar(chaveSessaoArmazenada(), SESSAO);
}

/* ============================================================ */
/* ========================= STREAK (sequência) ===================== */
/* ============================================================ */
function registarConclusaoDeHoje(){
  const streak = ARMAZEM.ler('streak', { dias:0, ultimaData:null });
  const hoje = obterDataDeHoje();
  if(streak.ultimaData === hoje) return streak;
  const dOntem = new Date(); dOntem.setDate(dOntem.getDate()-1);
  const ontem = `${dOntem.getFullYear()}-${String(dOntem.getMonth()+1).padStart(2,'0')}-${String(dOntem.getDate()).padStart(2,'0')}`;
  streak.dias = (streak.ultimaData === ontem) ? streak.dias + 1 : 1;
  streak.ultimaData = hoje;
  ARMAZEM.guardar('streak', streak);
  return streak;
}

function actualizarCabecalho(){
  document.getElementById('dataExtenso').textContent = obterDataExtenso();
  const streak = ARMAZEM.ler('streak', { dias:0, ultimaData:null });
  const pill = document.getElementById('streakPill');
  if(streak.dias > 0){
    pill.hidden = false;
    document.getElementById('streakDias').textContent = streak.dias;
  } else {
    pill.hidden = true;
  }
}

/* ============================================================ */
/* ===================== ARCO DE PROGRESSO (SVG) ==================== */
/* ============================================================ */
const ETAPAS_ORDEM = ['cruzada', 'trivia', 'logica'];
const ETAPAS_INFO = {
  cruzada: { icone:'✏️', nome:'Cruzada' },
  trivia:  { icone:'🌍', nome:'Trivia' },
  logica:  { icone:'🧩', nome:'Lógica' }
};

function indiceEtapa(nome){ return ETAPAS_ORDEM.indexOf(nome); }

function renderArco(){
  const wrap = document.getElementById('arcoWrap');
  const idxActual = indiceEtapa(SESSAO.etapaActual);

  // Três segmentos de um arco circular real (200° a -20°) + marcadores com ícone.
  const cx = 210, cy = 110, raio = 85;
  const anguloIni = 200, anguloFim = -20; // graus; 0° aponta para a direita, sentido anti-horário
  const passos = ETAPAS_ORDEM.length;
  const segHTML = [];
  const marcadoresHTML = [];

  for(let i=0; i<passos; i++){
    const a0 = anguloIni - (anguloIni - anguloFim) * (i / passos);
    const a1 = anguloIni - (anguloIni - anguloFim) * ((i+1) / passos);
    const p0 = pontoArco(cx, cy, raio, a0);
    const p1 = pontoArco(cx, cy, raio, a1);
    const nomeEtapa = ETAPAS_ORDEM[i];
    const estaConcluida = idxActual > i || SESSAO.etapaActual === 'fim';
    const estaActual = idxActual === i;
    const cor = estaConcluida ? 'var(--salva)' : (estaActual ? 'var(--ambar)' : 'rgba(242,238,227,0.16)');
    segHTML.push(`<path class="arco-segmento" d="M ${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A ${raio} ${raio} 0 0 0 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}" stroke="${cor}" stroke-width="10" fill="none" stroke-linecap="round" opacity="${estaConcluida || estaActual ? 1 : 0.6}"/>`);

    const aMid = (a0 + a1) / 2;
    const pMarc = pontoArco(cx, cy, raio, aMid);
    const escala = estaActual ? 1.18 : 1;
    const fundoMarc = estaConcluida ? 'var(--salva)' : (estaActual ? 'var(--ambar)' : 'var(--fundo-alto)');
    const corTexto = (estaConcluida || estaActual) ? '#13201C' : 'var(--osso-suave)';
    const conteudo = estaConcluida ? '✓' : ETAPAS_INFO[nomeEtapa].icone;
    marcadoresHTML.push(`
      <g class="arco-marcador" transform="translate(${pMarc.x.toFixed(2)} ${pMarc.y.toFixed(2)}) scale(${escala})">
        <circle r="19" fill="${fundoMarc}" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
        <text x="0" y="6" text-anchor="middle" font-size="17" fill="${corTexto}">${conteudo}</text>
      </g>
    `);
  }

  wrap.innerHTML = `
    <svg class="arco-svg" viewBox="0 0 420 165" aria-hidden="true">
      ${segHTML.join('')}
      ${marcadoresHTML.join('')}
    </svg>
    <div class="arco-rotulo">${rotuloArco()}</div>
  `;
}

function pontoArco(cx, cy, raio, anguloGraus){
  const rad = (anguloGraus * Math.PI) / 180;
  return { x: cx + raio * Math.cos(rad), y: cy - raio * Math.sin(rad) };
}

function rotuloArco(){
  if(SESSAO.etapaActual === 'inicio') return 'A sua sessão de hoje está pronta';
  if(SESSAO.etapaActual === 'fim') return '<strong>Sessão concluída!</strong>';
  const idx = indiceEtapa(SESSAO.etapaActual);
  return `Etapa <strong>${idx+1}</strong> de ${ETAPAS_ORDEM.length} · ${ETAPAS_INFO[SESSAO.etapaActual].nome}`;
}

/* ============================================================ */
/* ===================== NAVEGAÇÃO ENTRE ETAPAS =================== */
/* ============================================================ */
function irParaEtapa(nome){
  SESSAO.etapaActual = nome;
  guardarSessao();
  renderArco();
  renderEtapaActual();
}

function avancarDaEtapaActual(){
  const idx = indiceEtapa(SESSAO.etapaActual);
  if(idx === -1 || idx === ETAPAS_ORDEM.length - 1){
    concluirSessao();
  } else {
    irParaEtapa(ETAPAS_ORDEM[idx + 1]);
  }
}

function renderEtapaActual(){
  const cartao = document.getElementById('cartaoSessao');
  if(SESSAO.etapaActual === 'inicio') return renderInicio(cartao);
  if(SESSAO.etapaActual === 'cruzada') return renderCruzada(cartao);
  if(SESSAO.etapaActual === 'trivia') return renderTrivia(cartao);
  if(SESSAO.etapaActual === 'logica') return renderLogica(cartao);
  if(SESSAO.etapaActual === 'fim') return renderFim(cartao);
}

/* ========================== ECRÃ: INÍCIO ========================= */

/* ============================================================ */
/* ========================== ETAPA: CRUZADA ======================== */
/* ============================================================ */
function construirCelulasInfo(puzzle){
  const grelha = [];
  for(let r=0; r<puzzle.nrows; r++){
    const linha = [];
    for(let c=0; c<puzzle.size; c++){
      linha.push({ bloco: puzzle.rows[r][c] === '.', numero:null, palavras:[] });
    }
    grelha.push(linha);
  }
  puzzle.words.forEach((w, idx) => {
    for(let i=0; i<w.len; i++){
      const r = w.d === 'V' ? w.r + i : w.r;
      const c = w.d === 'H' ? w.c + i : w.c;
      grelha[r][c].palavras.push({ idx, pos:i });
    }
  });
  let proximoNumero = 1;
  const inicioParaNumero = {};
  const ordenadas = puzzle.words.map((w, idx) => ({ w, idx })).sort((a,b) => a.w.r - b.w.r || a.w.c - b.w.c);
  ordenadas.forEach(({w}) => {
    const chave = w.r + '_' + w.c;
    if(!(chave in inicioParaNumero)) inicioParaNumero[chave] = proximoNumero++;
  });
  puzzle.words.forEach(w => { grelha[w.r][w.c].numero = inicioParaNumero[w.r + '_' + w.c]; });
  return grelha;
}

function celulasDaPalavra(w){
  const cels = [];
  for(let i=0; i<w.len; i++) cels.push({ r: w.d === 'V' ? w.r + i : w.r, c: w.d === 'H' ? w.c + i : w.c });
  return cels;
}

let _grelhaInfoCache = null;
function obterGrelhaInfo(){
  if(!_grelhaInfoCache) _grelhaInfoCache = construirCelulasInfo(SESSAO.plano.cruzada.puzzle);
  return _grelhaInfoCache;
}

function letraNaCelulaCx(r, c){
  const puzzle = SESSAO.plano.cruzada.puzzle;
  return puzzle.rows[r][c] === '.' ? '' : puzzle.rows[r][c];
}

function renderCruzada(cartao){
  const puzzle = SESSAO.plano.cruzada.puzzle;
  if(!puzzle){
    cartao.innerHTML = `<p class="f-corpo">Não há cruzada disponível hoje.</p><div class="etapa-rodape"><button class="btn btn-primario" id="btnSaltarCx">Continuar →</button></div>`;
    document.getElementById('btnSaltarCx').addEventListener('click', avancarDaEtapaActual);
    return;
  }
  const grelhaInfo = obterGrelhaInfo();
  const cxEstado = SESSAO.cruzada;
  if(cxEstado.palavraActivaIdx == null || cxEstado.palavraActivaIdx < 0) cxEstado.palavraActivaIdx = 0;

  cartao.innerHTML = `
    <div class="etapa-eyebrow"><span class="icone-etapa">✏️</span> Cruzada · ${SESSAO.plano.cruzada.temaNome}</div>
    <h2 class="f-display etapa-titulo">Preencha as palavras</h2>
    <p class="etapa-tema">Toque numa célula e siga a pista.</p>

    <div class="mini-cx-pista-actual" id="cxPistaActual"></div>

    <div class="mini-cx-grelha" id="cxGrelha" style="grid-template-columns: repeat(${puzzle.size}, auto);"></div>

    <div class="mini-cx-nav">
      <button id="cxAnterior" aria-label="Pista anterior">←</button>
      <button id="cxSeguinte" aria-label="Pista seguinte">→</button>
    </div>

    <div class="etapa-rodape">
      <button class="btn btn-fantasma" id="btnRevelarCx">Revelar</button>
      <button class="btn btn-primario" id="btnContinuarCx">Continuar →</button>
    </div>
  `;

  const grelhaEl = document.getElementById('cxGrelha');
  const frag = document.createDocumentFragment();
  for(let r=0; r<puzzle.nrows; r++){
    for(let c=0; c<puzzle.size; c++){
      const info = grelhaInfo[r][c];
      const div = document.createElement('div');
      div.className = 'mini-cx-celula' + (info.bloco ? ' bloco' : '');
      div.dataset.r = r; div.dataset.c = c;
      if(!info.bloco){
        if(info.numero){
          const num = document.createElement('span');
          num.className = 'num'; num.textContent = info.numero;
          div.appendChild(num);
        }
        const input = document.createElement('input');
        input.maxLength = 1;
        input.autocomplete = 'off';
        input.inputMode = 'text';
        input.setAttribute('aria-label', info.numero ? `Pista ${info.numero}, linha ${r+1}, coluna ${c+1}` : `Linha ${r+1}, coluna ${c+1}`);
        const chave = r+'_'+c;
        input.value = cxEstado.respostas[chave] || '';
        if(cxEstado.finalizada){ input.value = letraNaCelulaCx(r,c); input.readOnly = true; }
        
        input.addEventListener('focus', () => seleccionarCelulaCx(r, c));
        input.addEventListener('keydown', (ev) => tratarTeclaCx(ev, r, c));
        input.addEventListener('beforeinput', (ev) => tratarAntesDeInserirCx(ev, r, c));
        input.addEventListener('input', (ev) => tratarInputCx(ev, r, c));
        input.addEventListener('click', () => clicarCelulaCx(r, c));
        
        div.appendChild(input);
      }
      frag.appendChild(div);
    }
  }
  grelhaEl.appendChild(frag);

  document.getElementById('cxAnterior').addEventListener('click', () => mudarPalavraCx(-1));
  document.getElementById('cxSeguinte').addEventListener('click', () => mudarPalavraCx(1));
  document.getElementById('btnRevelarCx').addEventListener('click', revelarCruzada);
  document.getElementById('btnContinuarCx').addEventListener('click', avancarDaEtapaActual);

  const p0 = celulasDaPalavra(puzzle.words[cxEstado.palavraActivaIdx])[0];
  marcarActivaCx(cxEstado.celulaActiva ? cxEstado.celulaActiva.r : p0.r, cxEstado.celulaActiva ? cxEstado.celulaActiva.c : p0.c);
  renderPistaActualCx();
}

function renderPistaActualCx(){
  const puzzle = SESSAO.plano.cruzada.puzzle;
  const grelhaInfo = obterGrelhaInfo();
  const w = puzzle.words[SESSAO.cruzada.palavraActivaIdx];
  const numero = grelhaInfo[w.r][w.c].numero;
  document.getElementById('cxPistaActual').innerHTML = `<span class="num">${numero}.</span>${w.q}`;
}

function palavrasNaCelulaCx(r, c){ return obterGrelhaInfo()[r][c].palavras.map(p => p.idx); }

function seleccionarCelulaCx(r, c){
  const grelhaInfo = obterGrelhaInfo();
  if(grelhaInfo[r][c].bloco) return;
  const ids = palavrasNaCelulaCx(r, c);
  if(!ids.length) return;
  if(!ids.includes(SESSAO.cruzada.palavraActivaIdx)) SESSAO.cruzada.palavraActivaIdx = ids[0];
  SESSAO.cruzada.celulaActiva = { r, c };
  marcarActivaCx(r, c);
  renderPistaActualCx();
}

function marcarActivaCx(r, c){
  document.querySelectorAll('.mini-cx-celula.palavra-activa').forEach(el => el.classList.remove('palavra-activa'));
  document.querySelectorAll('.mini-cx-celula.letra-activa').forEach(el => el.classList.remove('letra-activa'));
  const w = SESSAO.plano.cruzada.puzzle.words[SESSAO.cruzada.palavraActivaIdx];
  if(!w) return;
  celulasDaPalavra(w).forEach(cel => {
    const el = document.querySelector(`.mini-cx-celula[data-r="${cel.r}"][data-c="${cel.c}"]`);
    if(el) el.classList.add('palavra-activa');
  });
  const activaEl = document.querySelector(`.mini-cx-celula[data-r="${r}"][data-c="${c}"]`);
  if(activaEl) activaEl.classList.add('letra-activa');
}

function mudarPalavraCx(delta){
  const total = SESSAO.plano.cruzada.puzzle.words.length;
  const novoIdx = (SESSAO.cruzada.palavraActivaIdx + delta + total) % total;
  SESSAO.cruzada.palavraActivaIdx = novoIdx;
  const p0 = celulasDaPalavra(SESSAO.plano.cruzada.puzzle.words[novoIdx])[0];
  SESSAO.cruzada.celulaActiva = p0;
  marcarActivaCx(p0.r, p0.c);
  renderPistaActualCx();
  const el = document.querySelector(`.mini-cx-celula[data-r="${p0.r}"][data-c="${p0.c}"] input`);
  if(el) el.focus();
}

function tratarInputCx(ev, r, c){
  if(SESSAO.cruzada.finalizada){ ev.target.value = letraNaCelulaCx(r,c); return; }
  let val = normalizarLetra(ev.target.value).slice(-1);
  ev.target.value = val;
  const chave = r+'_'+c;
  if(val) SESSAO.cruzada.respostas[chave] = val; else delete SESSAO.cruzada.respostas[chave];
  if(val) avancarNaPalavraCx(r, c);
  verificarFlashCx(r, c);
  guardarSessao();
  verificarConclusaoCx();
}

function avancarNaPalavraCx(r, c){
  const w = SESSAO.plano.cruzada.puzzle.words[SESSAO.cruzada.palavraActivaIdx];
  const cels = celulasDaPalavra(w);
  const pos = cels.findIndex(cel => cel.r === r && cel.c === c);
  if(pos < 0 || pos >= cels.length - 1) return;
  const prox = cels[pos + 1];
  SESSAO.cruzada.celulaActiva = prox;
  const el = document.querySelector(`.mini-cx-celula[data-r="${prox.r}"][data-c="${prox.c}"] input`);
  if(el) el.focus();
}

function recuarNaPalavraCx(r, c){
  const w = SESSAO.plano.cruzada.puzzle.words[SESSAO.cruzada.palavraActivaIdx];
  const cels = celulasDaPalavra(w);
  const pos = cels.findIndex(cel => cel.r === r && cel.c === c);
  if(pos > 0){
    const ant = cels[pos-1];
    seleccionarCelulaCx(ant.r, ant.c);
    const el = document.querySelector(`.mini-cx-celula[data-r="${ant.r}"][data-c="${ant.c}"] input`);
    if(el) el.focus();
  }
}

function tratarTeclaCx(ev, r, c){
  if(ev.key === 'Tab' || ev.key === 'Enter'){
    ev.preventDefault();
    mudarPalavraCx(ev.shiftKey ? -1 : 1);
    return;
  }
  if(ev.key === 'Backspace'){
    const chave = r+'_'+c;
    if(!SESSAO.cruzada.respostas[chave]){ ev.preventDefault(); recuarNaPalavraCx(r, c); }
    return;
  }
  const mapa = { ArrowRight:{dr:0,dc:1}, ArrowLeft:{dr:0,dc:-1}, ArrowDown:{dr:1,dc:0}, ArrowUp:{dr:-1,dc:0} };
  if(mapa[ev.key]){
    ev.preventDefault();
    const grelhaInfo = obterGrelhaInfo();
    const puzzle = SESSAO.plano.cruzada.puzzle;
    let nr = r + mapa[ev.key].dr, nc = c + mapa[ev.key].dc;
    while(nr>=0 && nr<puzzle.nrows && nc>=0 && nc<puzzle.size && grelhaInfo[nr][nc].bloco){ nr += mapa[ev.key].dr; nc += mapa[ev.key].dc; }
    if(nr>=0 && nr<puzzle.nrows && nc>=0 && nc<puzzle.size && !grelhaInfo[nr][nc].bloco){
      seleccionarCelulaCx(nr, nc);
      const el = document.querySelector(`.mini-cx-celula[data-r="${nr}"][data-c="${nc}"] input`);
      if(el) el.focus();
    }
  }
}

function tratarAntesDeInserirCx(ev, r, c){
  if(SESSAO.cruzada.finalizada || ev.isComposing) return;
  const dados = ev.data;
  if(!dados) return;
  const letraNova = normalizarLetra(dados.slice(-1));
  if(!letraNova) return;
  const chave = r+'_'+c;
  const letraActual = SESSAO.cruzada.respostas[chave] || '';
  
  if(letraNova === letraActual){
    ev.preventDefault();
    avancarNaPalavraCx(r, c);
    verificarFlashCx(r, c);
    verificarConclusaoCx();
  }
}

function clicarCelulaCx(r, c){
  const ids = palavrasNaCelulaCx(r, c);
  // Se a célula pertence a 2 palavras e já está activa
  if(ids.length > 1 && SESSAO.cruzada.celulaActiva && SESSAO.cruzada.celulaActiva.r === r && SESSAO.cruzada.celulaActiva.c === c){
    const idxActual = SESSAO.cruzada.palavraActivaIdx;
    const novoIdx = ids.find(id => id !== idxActual);
    if(novoIdx !== undefined){
      SESSAO.cruzada.palavraActivaIdx = novoIdx;
      marcarActivaCx(r, c);
      renderPistaActualCx();
    }
  }
}

function verificarFlashCx(r, c){
  palavrasNaCelulaCx(r, c).forEach(idx => {
    const w = SESSAO.plano.cruzada.puzzle.words[idx];
    const cels = celulasDaPalavra(w);
    const completaECerta = cels.every(cel => SESSAO.cruzada.respostas[cel.r+'_'+cel.c] === letraNaCelulaCx(cel.r, cel.c));
    if(completaECerta){
      cels.forEach(cel => {
        const el = document.querySelector(`.mini-cx-celula[data-r="${cel.r}"][data-c="${cel.c}"]`);
        if(el && !el.classList.contains('flash')){
          el.classList.add('flash');
          setTimeout(() => el.classList.remove('flash'), 600);
        }
      });
    }
  });
}

function verificarConclusaoCx(){
  if(SESSAO.cruzada.finalizada) return;
  const puzzle = SESSAO.plano.cruzada.puzzle;
  const grelhaInfo = obterGrelhaInfo();
  for(let r=0;r<puzzle.nrows;r++){
    for(let c=0;c<puzzle.size;c++){
      if(!grelhaInfo[r][c].bloco){
        if((SESSAO.cruzada.respostas[r+'_'+c]||'') !== letraNaCelulaCx(r,c)) return;
      }
    }
  }
  SESSAO.cruzada.finalizada = true;
  guardarSessao();
  mostrarToast('✏️ Cruzada completa!', 'sucesso');
}

function revelarCruzada(){
  if(!window.confirm('Revelar todas as respostas desta cruzada?')) return;
  const puzzle = SESSAO.plano.cruzada.puzzle;
  const grelhaInfo = obterGrelhaInfo();
  for(let r=0;r<puzzle.nrows;r++){
    for(let c=0;c<puzzle.size;c++){
      if(!grelhaInfo[r][c].bloco) SESSAO.cruzada.respostas[r+'_'+c] = letraNaCelulaCx(r,c);
    }
  }
  SESSAO.cruzada.finalizada = true;
  guardarSessao();
  renderCruzada(document.getElementById('cartaoSessao'));
  mostrarToast('Cruzada revelada.', 'aviso');
}

/* ============================================================ */
/* =================== ETAPAS: TRIVIA E LÓGICA (genérico) ============ */
/* ============================================================ */
function renderEtapaQuiz(cartao, opts){
  // opts: { icone, eyebrow, titulo, lista, ordem, estado, idCorpo, onResponder, aoConcluirLabel }
  const { estado, ordem, lista } = opts;
  if(estado.posicao >= ordem.length){
    renderFimEtapaQuiz(cartao, opts);
    return;
  }
  const item = lista[ordem[estado.posicao]];
  const pct = Math.round((estado.posicao / ordem.length) * 100);

  cartao.innerHTML = `
    <div class="etapa-eyebrow"><span class="icone-etapa">${opts.icone}</span> ${opts.eyebrow}</div>
    <h2 class="f-display etapa-titulo">${opts.titulo}</h2>
    <p class="etapa-tema">${estado.posicao+1} de ${ordem.length} · ✅ ${estado.acertos} acertos</p>
    <div class="pergunta-texto">${item.p}</div>
    <div class="opcoes" id="opcoesQuiz"></div>
    <div class="explicacao" id="explicacaoQuiz"></div>
    <div class="etapa-rodape">
      <button class="btn btn-primario" id="btnSeguinteQuiz" style="display:none;">${estado.posicao === ordem.length-1 ? opts.aoConcluirLabel : 'Seguinte →'}</button>
    </div>
  `;

  const letras = ['A','B','C','D'];
  const opcoesEl = document.getElementById('opcoesQuiz');
  item.o.forEach((texto, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opcao';
    btn.innerHTML = `<span class="letra">${letras[idx]}</span><span>${texto}</span>`;
    btn.addEventListener('click', () => opts.onResponder(idx));
    opcoesEl.appendChild(btn);
  });

  document.getElementById('btnSeguinteQuiz').addEventListener('click', () => {
    estado.posicao++; estado.respondidaActual = false; estado.idxEscolhido = null;
    guardarSessao();
    opts.render();
  });

  if(estado.respondidaActual) aplicarResultadoVisualQuiz(item, estado.idxEscolhido, estado, ordem);
}

function aplicarResultadoVisualQuiz(item, idxEscolhido, estado, ordem){
  const correcta = item.r;
  document.querySelectorAll('#opcoesQuiz .opcao').forEach((el, idx) => {
    el.disabled = true;
    if(idx === correcta) el.classList.add('certa');
    else if(idx === idxEscolhido) el.classList.add('errada');
  });
  const exp = document.getElementById('explicacaoQuiz');
  exp.textContent = item.e || '';
  exp.classList.add('visivel');
  document.getElementById('btnSeguinteQuiz').style.display = 'inline-flex';
}

function renderFimEtapaQuiz(cartao, opts){
  cartao.innerHTML = `
    <div class="resumo-bloco">
      <div class="resumo-grande">${opts.icone}</div>
      <h2 class="f-display etapa-titulo" style="text-align:center;">${opts.eyebrow} concluída</h2>
      <p class="resumo-texto">Acertou ${opts.estado.acertos} de ${opts.ordem.length}.</p>
      <button class="btn btn-primario btn-grande" id="btnContinuarQuiz">Continuar →</button>
    </div>
  `;
  document.getElementById('btnContinuarQuiz').addEventListener('click', avancarDaEtapaActual);
}

function renderTrivia(cartao){
  const plano = SESSAO.plano.trivia;
  const lista = TV_BANCO[plano.categoriaId].perguntas;
  renderEtapaQuiz(cartao, {
    icone:'🌍', eyebrow:'Trivia · ' + plano.categoriaNome, titulo:'Responda à pergunta',
    lista, ordem: plano.ordem, estado: SESSAO.trivia, aoConcluirLabel:'Continuar →',
    render: () => renderTrivia(cartao),
    onResponder: (idx) => responderQuiz(idx, SESSAO.trivia, lista, plano.ordem, () => renderTrivia(cartao))
  });
}

function renderLogica(cartao){
  const plano = SESSAO.plano.logica;
  const lista = LG_BANCO[plano.categoriaId].puzzles;
  renderEtapaQuiz(cartao, {
    icone:'🧩', eyebrow:'Lógica · ' + plano.categoriaNome, titulo:'Resolva o desafio',
    lista, ordem: plano.ordem, estado: SESSAO.logica, aoConcluirLabel:'Concluir sessão →',
    render: () => renderLogica(cartao),
    onResponder: (idx) => responderQuiz(idx, SESSAO.logica, lista, plano.ordem, () => renderLogica(cartao))
  });
}

function responderQuiz(idxEscolhido, estado, lista, ordem, rerender){
  if(estado.respondidaActual) return;
  estado.respondidaActual = true;
  estado.idxEscolhido = idxEscolhido;
  const item = lista[ordem[estado.posicao]];
  if(idxEscolhido === item.r){ estado.acertos++; mostrarToast('✅ Resposta correcta!', 'sucesso'); }
  else mostrarToast('❌ Resposta incorrecta', 'erro');
  guardarSessao();
  rerender();
}

/* ============================================================ */
/* ========================== ECRÃ: FIM ========================== */
/* ============================================================ */
function concluirSessao(){
  SESSAO.etapaActual = 'fim';
  SESSAO.concluidaEm = Date.now();
  guardarSessao();
  const streak = registarConclusaoDeHoje();
  renderArco();
  renderFim(document.getElementById('cartaoSessao'));
  actualizarCabecalho();
}

function renderFim(cartao){
  const acertosTotal = SESSAO.trivia.acertos + SESSAO.logica.acertos;
  const totalPerguntas = SESSAO.plano.trivia.ordem.length + SESSAO.plano.logica.ordem.length;
  const streak = ARMAZEM.ler('streak', {dias:0});
  cartao.innerHTML = `
    <div class="resumo-bloco">
      <div class="final-selo" aria-hidden="true">🏅</div>
      <h2 class="f-display etapa-titulo" style="text-align:center;">Sessão concluída!</h2>
      <p class="resumo-texto">Acertou ${acertosTotal} de ${totalPerguntas} perguntas hoje. Volte amanhã para novos temas.</p>
      ${streak.dias > 1 ? `<p class="resumo-texto">🔥 Está numa sequência de <strong>${streak.dias} dias</strong>.</p>` : ''}
      <div class="resumo-etapas">
        <div class="resumo-etapa-item"><span class="icone">✏️</span><span class="rotulo">Cruzada</span><span class="tema">${SESSAO.cruzada.finalizada ? 'Completa' : 'Por terminar'}</span></div>
        <div class="resumo-etapa-item"><span class="icone">🌍</span><span class="rotulo">Trivia</span><span class="tema">${SESSAO.trivia.acertos}/${SESSAO.plano.trivia.ordem.length}</span></div>
        <div class="resumo-etapa-item"><span class="icone">🧩</span><span class="rotulo">Lógica</span><span class="tema">${SESSAO.logica.acertos}/${SESSAO.plano.logica.ordem.length}</span></div>
      </div>
    </div>
  `;
}

/* ============================================================ */
/* ============================ ARRANQUE ========================= */
/* ============================================================ */
async function carregarDados(){
  // Os dados (CX_BANCO, TV_BANCO, LG_BANCO) já estão embutidos no início deste ficheiro,
  // por isso a sessão funciona com duplo-clique, sem precisar de servidor nem ligação à internet.
  try{
    const ok = Object.keys(CX_BANCO).length > 0 && Object.keys(TV_BANCO).length > 0 && Object.keys(LG_BANCO).length > 0;
    if(!ok) throw new Error('Dados embutidos em falta ou vazios.');
    return true;
  } catch(erro){
    console.error('Falha ao carregar dados:', erro);
    mostrarToast('⚠️ Não foi possível carregar a sessão. Recarregue a página.', 'erro');
    return false;
  }
}

async function iniciar(){
  if(sessionStorage.getItem('sessao_diaria_limpo') === 'true'){
    mostrarToast('🗑️ Dados limpos com sucesso.', 'aviso');
    sessionStorage.removeItem('sessao_diaria_limpo');
  }

  actualizarCabecalho();
  document.getElementById('btnLimparDados').addEventListener('click', limparTodosOsDados);
  const ok = await carregarDados();
  if(!ok){
    document.getElementById('cartaoSessao').innerHTML = '<p class="f-corpo">Não foi possível carregar os dados da sessão. Verifique a ligação e recarregue a página.</p>';
    return;
  }
  carregarOuCriarSessao();
  renderArco();
  renderEtapaActual();

  window.addEventListener('beforeunload', guardarSessao);
  document.addEventListener('visibilitychange', () => { if(document.hidden) guardarSessao(); });
}

document.addEventListener('DOMContentLoaded', iniciar);

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch((erro) => console.error('Falha no service worker:', erro));
  });
}

</script>
